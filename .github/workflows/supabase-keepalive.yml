name: Supabase keepalive ping

on:
  schedule:
    # Runs every day at 08:00 UTC – adjust as needed
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual runs for testing

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase endpoint
        env:
          PING_URL: ${{ secrets.SUPABASE_PING_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$PING_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "PING_URL or SUPABASE_ANON_KEY secret is not set."
            exit 1
          fi

          echo "Pinging Supabase endpoint: $PING_URL"
          # Use a lightweight GET with Supabase anon key; send both apikey and Authorization headers
          curl --fail --location \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$PING_URL"
